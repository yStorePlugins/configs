# Upgrades da espada compraveis durante a dungeon.
# O custo real por compra e: amount * (nivel_atual + 1)
# Ex: amount: 30.0 -> nivel 0 custa 30, nivel 1 custa 60, nivel 2 custa 90, etc.
# Use {providerId} na lore para exibir o custo (ex: {money} sera substituido por "30").

upgrades:
  fio_da_lamina:
    display-name: '&cFio da Lamina'
    max-level: 5
    enchant: DAMAGE_ALL
    enchant-level-per-upgrade: 1
    prices:
      price1:
        provider: 'money'
        amount: 30.0
    icon:
      material: 'DIAMOND_SWORD'
      name: '&cFio da Lamina'
      lore:
        - ''
        - ' &7Aumenta o dano da espada.'
        - ' &7Nivel: &e{level}&7/&e{max_level}'
        - ' &7Custo: &5{money} &7Money'
        - ''
        - ' &eClique para comprar'
        - ''

