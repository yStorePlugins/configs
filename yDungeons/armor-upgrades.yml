# Upgrades de armadura compraveis durante a dungeon.
# O custo real por compra e: amount * (nivel_atual + 1)
# Use {providerId} na lore para exibir o custo (ex: {money} sera substituido pelo valor).

upgrades:
  pele_de_ferro:
    display-name: '&7Pele de Ferro'
    max-level: 4
    enchant: PROTECTION_ENVIRONMENTAL
    enchant-level-per-upgrade: 1
    prices:
      price1:
        provider: 'money'
        amount: 40.0
    icon:
      material: 'IRON_CHESTPLATE'
      name: '&7Pele de Ferro'
      lore:
        - ''
        - ' &7Adiciona Protecao a toda a armadura.'
        - ' &7Nivel: &e{level}&7/&e{max_level}'
        - ' &7Custo: &5{money} &7Money'
        - ''
        - ' &eClique para comprar'
        - ''

