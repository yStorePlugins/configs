  help: |
    &r
    &e/dungeonadmin help &8- &7Exibe esta mensagem.
    &e/dungeonadmin criar &6<dungeon> &8- &7Cria uma nova dungeon.
    &e/dungeonadmin deletar &6<dungeon> &8- &7Deleta uma dungeon.
    &e/dungeonadmin enable &6<dungeon> &8- &7Ativa uma dungeon.
    &e/dungeonadmin disable &6<dungeon> &8- &7Desativa uma dungeon.
    &e/dungeonadmin finalizar &6<dungeon> &8- &7Finaliza a dungeon forcadamente.
    &e/dungeonadmin info &6<dungeon> &8- &7Exibe informacoes da dungeon.
    &e/dungeonadmin stats &6<jogador> &8- &7Exibe estatisticas de um jogador.
    &e/dungeonadmin kick &6<jogador> &8- &7Expulsa um jogador da dungeon.
    &e/dungeonadmin ban &6<jogador> &6<dungeon> &8- &7Bane um jogador de uma dungeon.
    &e/dungeonadmin unban &6<jogador> &6<dungeon> &8- &7Desbane um jogador de uma dungeon.
    &e/dungeonadmin list &8- &7Lista todas as dungeons.
    &e/dungeonadmin setup &6<dungeon> &8- &7Entra no modo setup da dungeon.
    &e/dungeonadmin passe &6<dar|remover|ver> &6... &8- &7Gerencia passes de dungeon.
    &e/dungeonadmin reload &8- &7Recarrega as configuracoes.
    &r
