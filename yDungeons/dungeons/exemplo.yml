# Exemplo de configuracao de dungeon.
# Copie este arquivo e edite para criar novas dungeons.
# Use /dungeon setup para configurar spawn, saida, portoes, mobs e bosses in-game.

# Identificador unico da dungeon (nome do arquivo sem .yml)
key: 'exemplo'

# Nome exibido no menu
display-name: '&6Dungeon Exemplo'

# Se a dungeon esta ativada
enabled: false

# Se a dungeon e solo (um jogador, requer passe)
solo: false

# Item fisico do passe desta dungeon.
# Obrigatorio para dungeons solo (solo: true).
# Suporta os mesmos campos de qualquer item: material, name, lore, etc.
passe-item:
  material: 'PAPER'
  name: '&d&lPasse de Dungeon &8— &f{dungeon_name}'
  lore:
    - ''
    - ' &7Este item e um passe para entrar'
    - ' &7na dungeon solo &f{dungeon_name}&7.'
    - ''
    - ' &dClique com o botao direito para ativar'
    - ''

# Minimo e maximo de jogadores por sessao
min-players: 1
max-players: 4

# Modo de morte: REMOVE (tp para saida) ou SPECTATOR (vira espectador)
death-mode: 'REMOVE'

# Se verdadeiro, o jogador deve estar com o inventario vazio para entrar na fila ou iniciar a dungeon.
require-empty-inventory: false

# Whitelist de jogadores (UUIDs). Se vazio, qualquer jogador pode entrar.
whitelist:
  enabled: false
  players: []

# Recompensas por tipo de evento desta dungeon.
# Use chaves existentes em rewards.yml.
# Cada recompensa definida em rewards.yml usa seu proprio "chance".
reward-pool:
  mob-kill:
    - 'mob_kill'
  boss-kill:
    - 'boss_kill'
  dungeon-complete:
    - 'dungeon_complete'

# Localizacoes configuradas via /dungeon setup
# Nao edite manualmente — use o comando de setup
spawn-location: ''
exit-location: ''

# Rodadas
