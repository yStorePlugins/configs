#
# Sistemas principais.

# Delay para carregar os dados depois do login
# Necessário para usar em servidor de mina separado
# Recomendado: 20 ticks
login-delay: 20

# Sistemas gerais
general:
  # Mínimo de jogadores para iniciar a dungeon
  min-players: 1
  # Máximo de jogadores por dungeon
  max-players: 4
  # Segundos de contagem regressiva na fila antes de teletransportar
  queue-countdown-seconds: 10
  # Tempo de preparacao (em segundos) antes dos mobs aparecerem no inicio de cada round
  warmup-time: 5
  # Intervalo (em segundos) para verificar jogadores AFK
  afk-check-interval-seconds: 30
  # Tempo máximo (em segundos) sem movimento antes de ser removido por AFK
  afk-max-seconds: 60
  # Configurações da espada evolutiva
  sword:
    # Kills necessários para subir de nível
    kills-per-level: 10
    # Dano adicional por nível da espada
    damage-per-level: 5.0
    # Dano base da espada (independe do nivel)
    base-damage: 4.0
    # Ranks da espada — determinam o material e os enchants base conforme o nivel
    ranks:
      bronze:
        display-name: 'Bronze'
        colored-name: '&6Bronze'
        min-level: 1
        max-level: 5
        material: 'WOOD_SWORD'
        base-enchants:
          DAMAGE_ALL: 1
      ferro:
        display-name: 'Ferro'
        colored-name: '&7Ferro'
        min-level: 6
        max-level: 10
        material: 'IRON_SWORD'
        base-enchants:
          DAMAGE_ALL: 2
      prata:
        display-name: 'Prata'
        colored-name: '&fPrata'
        min-level: 11
        max-level: 15
        material: 'IRON_SWORD'
        base-enchants:
          DAMAGE_ALL: 3
      ouro:
        display-name: 'Ouro'
        colored-name: '&eOuro'
        min-level: 16
        max-level: 20
        material: 'GOLD_SWORD'
        base-enchants:
          DAMAGE_ALL: 4
      diamante:
        display-name: 'Diamante'
        colored-name: '&bDiamante'
        min-level: 21
        max-level: 30
        material: 'DIAMOND_SWORD'
        base-enchants:
          DAMAGE_ALL: 5
      mestre:
        display-name: 'Mestre'
        colored-name: '&dMestre'
        min-level: 31
        max-level: 50
        material: 'DIAMOND_SWORD'
        base-enchants:
          DAMAGE_ALL: 6
          FIRE_ASPECT: 1
      lendario:
        display-name: 'Lendario'
        colored-name: '&6&lLendario'
        min-level: 51
        max-level: 9999
        material: 'DIAMOND_SWORD'
        base-enchants:
          DAMAGE_ALL: 7
          FIRE_ASPECT: 2
          KNOCKBACK: 1

  # Configurações da armadura evolutiva
  armor:
    # Ranks da armadura — determinam os materiais e enchants base conforme o nivel de armadura
    ranks:
      couro:
        display-name: 'Couro'
        colored-name: '&7Couro'
        min-level: 1
        max-level: 5
        helmet-material: 'LEATHER_HELMET'
        chestplate-material: 'LEATHER_CHESTPLATE'
        leggings-material: 'LEATHER_LEGGINGS'
        boots-material: 'LEATHER_BOOTS'
        base-enchants:
          PROTECTION_ENVIRONMENTAL: 1
      cota_de_malha:
        display-name: 'Cota de Malha'
        colored-name: '&aCota de Malha'
        min-level: 6
        max-level: 10
        helmet-material: 'CHAINMAIL_HELMET'
        chestplate-material: 'CHAINMAIL_CHESTPLATE'
        leggings-material: 'CHAINMAIL_LEGGINGS'
        boots-material: 'CHAINMAIL_BOOTS'
        base-enchants:
          PROTECTION_ENVIRONMENTAL: 2
      ferro:
        display-name: 'Ferro'
        colored-name: '&7Ferro'
        min-level: 11
        max-level: 20
        helmet-material: 'IRON_HELMET'
        chestplate-material: 'IRON_CHESTPLATE'
        leggings-material: 'IRON_LEGGINGS'
        boots-material: 'IRON_BOOTS'
        base-enchants:
          PROTECTION_ENVIRONMENTAL: 3
      ouro:
        display-name: 'Ouro'
        colored-name: '&eOuro'
        min-level: 21
        max-level: 30
        helmet-material: 'GOLD_HELMET'
        chestplate-material: 'GOLD_CHESTPLATE'
        leggings-material: 'GOLD_LEGGINGS'
        boots-material: 'GOLD_BOOTS'
        base-enchants:
          PROTECTION_ENVIRONMENTAL: 4
      diamante:
        display-name: 'Diamante'
        colored-name: '&bDiamante'
        min-level: 31
        max-level: 9999
        helmet-material: 'DIAMOND_HELMET'
        chestplate-material: 'DIAMOND_CHESTPLATE'
        leggings-material: 'DIAMOND_LEGGINGS'
        boots-material: 'DIAMOND_BOOTS'
        base-enchants:
          PROTECTION_ENVIRONMENTAL: 4
          THORNS: 1

  # Item do Bruxo exibido na hotbar do jogador durante a dungeon
  bruxo-item:
    # Slot da hotbar onde o item será colocado (0-8)
    slot: 8
    material: '8aa986a6e1c2d88ff198ab2c3259e8d2674cb83a6d206f883bad2c8ada819'
    name: '&5&lBruxo'
    lore:
      - ''
      - ' &7Clique para abrir o menu do Bruxo.'
      - ''

# Scoreboard lateral exibido durante a dungeon
scoreboard:
  # Ativar ou desativar o scoreboard
  enabled: true
  # Título do scoreboard. Suporta placeholders e cores com '&'
  title: '&6&l⚔ {dungeon} ⚔'
  # Linhas do scoreboard (máximo 16). Suporta placeholders
  lines:
    - '&7&m──────────────'
    - '&eDungeon: &f{dungeon}'
    - '&eRound: &f{round}&7/&f{total_rounds}'
    - ' '
    - '&aMobs restantes: &f{mobs}'
    - '&aJogadores vivos: &f{players}'
    - '  '
    - '&6Money: &f{amount}'
    - '&6Mobs mortos: &f{mobs_killed}'
    - '   '
    - '&7Espada Nv.&f{sword_level}'
    - '    '
    - '&7Portão atual: &f{gate}'
#    - '&7Próximo portão: &f{next_gate}'
    - '&7&m──────────────'
