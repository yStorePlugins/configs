# Sistema de menus.

# Setas dos menus.
arrows:
  back:
    material: 'ARROW:0'
    name: '&cVoltar'
    lore: ['&7Clique para voltar ao menu anterior.']
  previous:
    material: 'ARROW:0'
    name: '&cAnterior'
    lore: ['&7Clique para ir à página anterior.']
  next:
    material: 'ARROW:0'
    name: '&aPróximo'
    lore: ['&7Clique para ir à próxima página.']

# Menu principal
main-menu:
  name: '&8X1'
  size: 27
  items:
    profile:
      slot: 11
      material: '{player}'
      name: '&eSuas Informações'
      lore:
        - ''
        - ' &7Vitórias: &a{wins}'
        - ' &7Derrotas: &c{losses}'
        - ' &7Lutas: &f{fights}'
        - ''
    arenas:
      slot: 13
      material: 'DIAMOND_SWORD'
      flags: ['*']
      name: '&aArenas'
      lore:
        - '&7Ver estado das arenas'
        - '&7e escolher rapidamente.'
    top:
      slot: 15
      material: 'GOLD_INGOT'
      name: '&6TOP'
      lore:
        - '&7Abrir ranking de'
        - '&7vitórias no X1.'

# Menu de arenas
arenas-menu:
  name: '&8X1'
  size: 45
  slots: [11, 12, 13, 14, 15, 20, 21, 22, 23, 24, 29, 30, 31, 32, 33]
  previous-slot: 18
  next-slot: 26
  back-slot: 40

# Menu de gerenciamento das arenas para os admins
admin-arenas-menu:
  name: '&8X1'
  size: 45
  slots: [11, 12, 13, 14, 15, 20, 21, 22, 23, 24, 29, 30, 31, 32, 33]
  previous-slot: 18
  next-slot: 26
  back-slot: -1

# Menu de gerenciar arena
admin-arena-setup-menu:
  name: '&8X1'
  size: 45
  back-slot: 18
  items:
    tp-pos1:
      slot: 10
      material: 'COMPASS'
      name: '&bIr para Pos1'
      lore:
        - '&7Clique para teleportar para'
        - '&7a Pos1 da arena {arena}.'
    tp-pos2:
      slot: 12
      material: 'COMPASS'
      name: '&bIr para Pos2'
      lore:
        - '&7Clique para teleportar para'
        - '&7a Pos2 da arena {arena}.'
    tp-exit:
      slot: 14
      material: 'COMPASS'
      name: '&bIr para Saída'
      lore:
        - '&7Clique para teleportar para'
        - '&7a Saída da arena {arena}.'
    tp-camarote:
      slot: 16
      material: 'COMPASS'
      name: '&bIr para Camarote'
      lore:
        - '&7Clique para teleportar para'
        - '&7o Camarote da arena {arena}.'
    pos1:
      slot: 19
      material: 'DIAMOND_SWORD'
      flags: ['*']
      name: '&aSetar Pos1'
      lore:
        - '&7Clique para setar a Pos1'
        - '&7na arena {arena}.'
    pos2:
      slot: 21
      material: 'DIAMOND_HELMET'
      name: '&aSetar Pos2'
      lore:
        - '&7Clique para setar a Pos2'
        - '&7na arena {arena}.'
    exit:
      slot: 23
      material: 'ENDER_PEARL'
      name: '&aSetar Saída'
      lore:
        - '&7Clique para setar a saída'
        - '&7na arena {arena}.'
    camarote:
      slot: 25
      material: 'EYE_OF_ENDER'
      name: '&aSetar Camarote'
      lore:
        - '&7Clique para setar o camarote'
        - '&7na arena {arena}.'
    clear-pos1:
      slot: 28
      material: 'BARRIER'
      name: '&cLimpar Pos1'
      lore:
        - '&7Remove a Pos1 da arena {arena}.'
    clear-pos2:
      slot: 30
      material: 'BARRIER'
      name: '&cLimpar Pos2'
      lore:
        - '&7Remove a Pos2 da arena {arena}.'
    clear-exit:
      slot: 32
      material: 'BARRIER'
      name: '&cLimpar Saída'
      lore:
        - '&7Remove a Saída da arena {arena}.'
    clear-camarote:
      slot: 34
      material: 'BARRIER'
      name: '&cLimpar Camarote'
      lore:
        - '&7Remove o Camarote da arena {arena}.'
    toggle-custom-items:
      slot: 37
      material: 'LEVER'
      name: '&aItens setados'
      lore:
        - '&7Status: {status}'
        - '&7Clique para alternar.'
    set-custom-items:
      slot: 43
      material: 'CHEST'
      name: '&aSalvar itens setados'
      lore:
        - '&7Status: {status}'
        - ''
        - '&7Equipe seu inventário e armadura'
        - '&7e clique para salvar na arena {arena}.'
        - ''
        - '&fBotão direito: &apreview dos itens salvos.'

admin-items-preview-menu:
  name: '&8Preview Itens: {arena}'

# Menu de TOP
top-menu:
  name: '&8X1'
  size: 45
  slots: [11, 12, 13, 14, 15, 20, 21, 22, 23, 24, 29, 30, 31, 32, 33]
  previous-slot: 18
  next-slot: 26
  back-slot: 40
  top-item:
    material: '{player}'
    name: '&6#{pos} &f{player}'
    lore:
      - ''
      - ' &7Vitórias: &a{wins}'
      - ' &7Derrotas: &c{losses}'
      - ' &7Lutas: &f{fights}'
      - ''

# Menu de desafiar
arena-challenge-menu:
  name: '&8X1'
  size: 27
  back-slot: 18
  economy-list:
    selected-format: '&a* {provider}: &f{amount}'
    unselected-format: '&7- {provider}: &f{amount}'
    empty-amount: '-'
  items:
    select-target:
      slot: 11
      material: 'NAME_TAG'
      name: '&aSelecionar jogador'
      lore:
        - '&7Atual: &f{target}'
        - ''
        - '&eClique e digite no chat'
    switch-economy:
      slot: 12
      material: 'COMPASS'
      name: '&aAlternar economia'
      lore:
        - '&7Atual: &f{provider}'
        - '&7Valor atual: &f{amount}'
        - ''
        - '&7Preços por economia:'
        - '{economies}'
        - ''
        - '&eClique para alternar'
    economies:
      slot: 13
      material: 'EMERALD'
      name: '&aEconomias'
      lore:
        - '&7Provider atual: &f{provider}'
        - '&7Valor atual: &f{amount}'
        - ''
        - '&7Preços por economia:'
        - '{economies}'
        - ''
        - '&eClique para abrir as economias'
    send:
      slot: 15
      material: 'PAPER'
      name: '&aEnviar desafio'
      lore:
        - '&7Jogador: &f{target}'
        - '&7Provider: &f{provider}'
        - '&7Valor: &f{amount}'
        - ''
        - '&7Preços por economia:'
        - '{economies}'
        - ''
        - '&eClique para enviar'

# Menu de selecionar economias
arena-economies-menu:
  name: '&8X1'
  size: 45
  slots: [11, 12, 13, 14, 15, 20, 21, 22, 23, 24, 29, 30, 31, 32, 33]
  previous-slot: 18
  next-slot: 26
  back-slot: 40
