  cancelled: '&cVocê cancelou a ação.'
  reload: '&aConfigurações recarregadas com sucesso.'
  help: |

    &a/x1 &8- &7Abre o menu principal do X1.
    &a/x1 desafiar <jogador> [arena] [provider] <valor> &8- &7Desafia um jogador.
    &a/x1 aceitar &8- &7Aceita um desafio pendente.
    &a/x1 negar &8- &7Nega um desafio pendente.
    &a/x1 cancelar &8- &7Cancela seu desafio pendente.
    &a/x1 camarote [arena] &8- &7Entra no camarote de uma arena em luta.
    &a/x1 saircamarote &8- &7Sai do modo espectador do camarote.
    &a/x1 arenas &8- &7Abre o menu de arenas.
    &a/x1 top [limite] &8- &7Mostra o top de vitórias.
    &a/x1 stats [jogador] &8- &7Mostra estatísticas de X1.

  help-admin: |

    &a/x1 &8- &7Abre o menu principal do X1.
    &a/x1 desafiar <jogador> [arena] [provider] <valor> &8- &7Desafia um jogador.
    &a/x1 aceitar &8- &7Aceita um desafio pendente.
    &a/x1 negar &8- &7Nega um desafio pendente.
    &a/x1 cancelar &8- &7Cancela seu desafio pendente.
    &a/x1 camarote [arena] &8- &7Entra no camarote de uma arena em luta.
    &a/x1 saircamarote &8- &7Sai do modo espectador do camarote.
    &a/x1 setpos1 <arena> &8- &7Seta a posição 1 da arena.
    &a/x1 setpos2 <arena> &8- &7Seta a posição 2 da arena.
    &a/x1 setsaida <arena> &8- &7Seta a saída da arena.
    &a/x1 setcamarote <arena> &8- &7Seta o camarote da arena.
    &a/x1 itenssetados <arena> &8- &7Ativa/desativa itens setados da arena.
    &a/x1 setitens <arena> &8- &7Salva seu inventário/armadura como itens setados.
    &a/x1 arenas &8- &7Abre o menu de arenas.
    &a/x1 admin &8- &7Abre o menu admin de arenas.
    &a/x1 top [limite] &8- &7Mostra o top de vitórias.
    &a/x1 stats [jogador] &8- &7Mostra estatísticas de X1.
    &a/x1 info [arena] &8- &7Mostra status de uma arena.
    &a/x1 reload &8- &7Recarrega as configurações.

