# Sistema de menus.

# Setas dos menus.
arrows:
  back:
    material: 'ARROW:0'
    name: '&cVoltar'
    lore: [' &7Clique para voltar.']
  previous:
    material: 'ARROW:0'
    name: '&cAnterior'
    lore: [' &7Clique para ir à página anterior.']
  next:
    material: 'ARROW:0'
    name: '&aPróximo'
    lore: [' &7Clique para ir à próxima página.']

# Lista da equipe
staff-list:
  name: '&8Equipe — Ponto'
  size: 54
  slots: [10,11,12,13,14,15,16,19,20,21,22,23,24,25,28,29,30,31,32,33,34]
  previous-slot: 48
  next-slot: 50
  top-button:
    slot: 49
    material: 'GOLD_INGOT'
    name: '&6&lRanking'
    lore:
      - ''
      - ' &7Clique para abrir o ranking'
      - ' &7de tempo da equipe.'
      - ''
  staff-item:
    material: '{player}'
    name: '&6&l{player}'
    lore:
      - ''
      - ' &7Status: {status}'
      - ' &7Dia: &f{day}'
      - ' &7Entrada: &f{login}'
      - ' &7Saída: &f{logout}'
      - ' &7Sessão atual: &f{session}'
      - ' &7Tempo hoje: &f{today}'
      - ' &7Tempo total: &f{total}'
      - ''
      - ' &eClique para ver as sessões'
      - ''
  facing:
    glass1:
      slot: 0
      material: STAINED_GLASS_PANE:15
      name: ' '
    glass2:
      slot: 8
      material: STAINED_GLASS_PANE:15
      name: ' '
    glass3:
      slot: 45
      material: STAINED_GLASS_PANE:15
      name: ' '
    glass4:
      slot: 53
      material: STAINED_GLASS_PANE:15
      name: ' '

