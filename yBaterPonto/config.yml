#
# Configurações do banco de dados.

database:
  # Determina o tipo de banco de dados. Valores válidos: [SQLITE, MYSQL, HIKARI (recomendado)]
  storage-type: SQLITE

  # Dados para conexão ao banco de dados MYSQL.
  data:
    # Endereço de conexão do banco de dados. [EX: 127.0.0.1]
    host: localhost
    # Porta de conexão do banco de dados. [EX: 3306]
    port: 3306
    # Nome do banco de dados a ser conectado. [EX: minecraft]
    database: ''
    # Usuário de conexão. [EX: root]
    username: ''
    # Senha do usuário de conexão: [EX: 123]
    password: ''

# Configurações do servidor redis
redis:
  # Ativar a conexão com o redis
  enabled: false
  # Endereço de conexão. [EX: 127.0.0.1]
  host: 'localhost'
  # Porta de conexão. [EX: 3306]
  port: 6379
  # Usuário de conexão. [EX: root]
  username: ''
  # Senha do usuário de conexão: [EX: 123]
  password: ''

# Delay para carregar os dados depois do login
# Necessário para usar em servidor de mina separado
# Recomendado: 20 ticks
login-delay: 20

# Sistemas gerais
general:
  # Permissão que identifica membros da equipe a serem rastreados
  staff-permission: 'ybaterponto.staff'
  # Máximo de sessões guardadas por membro (as mais antigas são removidas)
  max-sessions-per-player: 50
  # Formato de data exibido nas mensagens
  date-format: 'dd/MM/yyyy'
  # Formato de horário exibido nas mensagens
  time-format: 'HH:mm:ss'
  # Intervalo do tick de tempo online (em ticks). 20 = 1 segundo
  tick-interval: 20

# Status exibidos
status:
  online: '&aOnline'
  offline: '&cOffline'
  in-session: '&aEm expediente'
  out-session: '&7Fora do expediente'

# Sons
sounds:
  session-start: ENTITY_EXPERIENCE_ORB_PICKUP
  session-end: ENTITY_ITEM_BREAK
  action-fail: ENTITY_VILLAGER_NO
