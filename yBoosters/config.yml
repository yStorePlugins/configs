# Configurações do banco de dados.

database:
  # Determina o tipo de banco de dados. Valores válidos: [SQLITE, MYSQL, HIKARI (recomendado)]
  storage-type: SQLITE

  # Dados para conexão ao banco de dados MYSQL.
  data:
    # Endereço de conexão do banco de dados. [EX: 127.0.0.1]
    host: localhost
    # Porta de conexão do banco de dados. [EX: 3306]
    port: 3306
    # Nome do banco de dados a ser conectado. [EX: minecraft]
    database: ''
    # Usuário de conexão. [EX: root]
    username: ''
    # Senha do usuário de conexão: [EX: 123]
    password: ''
    # Prefixo para diferenciar no redis
    prefix: ''

# Opções gerais do plugin
general:
  # Stackar o booster global com o booster proprio
  stack: true
  # Sistema de pausar o booster
  pause: true
  # Actionbar do booster individual
  actionbar: '&cBooster de &f{skill}&c, restante: &f{tempo}&c.'
  # Preço da recompensa misteriosa
  reward-price: 1.0
  # Sistema de agradecer
  thank:
    # Pontos mínimos a serem dados
    min: 1.0
    # Pontos máximos a serem dados
    max: 5.0

# Sistema de anúncios do mcMMO
mcmmo-announces:
  message: '<nl>&8[Upgrade] &eO jogador &6{player} &eatingiu o lével &a{level} &ena skill &6{skill}&f.<nl>'
  # Leveis que serão anunciados
  levels: [1, 2, 3, 4, 5]

# Item do booster
# A lore do item é configurada em cada booster
# na skills.yml
item:
  skill:
    material: '24c22b8df0a853a49cb82e90a618d65012122361c8398062fcbaf74d5696c2a9'
    name: '&8Booster de habilidades'
  skill-global:
    material: 'ff778f72eaca452ee013893e2bc53d8d5b1fca44cfe2703865b054c28a3dd7'
    name: '&8Booster Global de habilidades'