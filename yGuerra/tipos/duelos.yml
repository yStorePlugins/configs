# Permissão para poder participar do evento
Permissao: ''

Comando:
  Comando: 'duelos'
  Aliases: [ duelo, duel, duels ]

Minimo clans: 2
Minimo jogadores: 2

# Máximo de clans
# Deixe 0 para ser infinito
Maximo clan: 0

# Máximo de jogadores por clan
# Deixe 0 para ser infinito
Maximo jogador clan: 0

# Máximo de jogadores no evento
Maximo jogador: 0

# Precisa de clan pra entrar
Precisa de clan: true

# Deixa os jogadores apostarem
Aposta: false

# Ativar o teleporte para a sala de espera
Sala de espera: true

# O jogador perder os itens ao morrer/deslogar/sair
Perder itens: true

# Permitir o jogador de dropar itens do inventário no chão
Player drop: false

# Comando para executar no jogador que mais matou
Comando mais matou: []

#
Temporizador:
  Chamadas:
    Quantia: 3
    Tempo: 10
  Iniciado:
    Tempo: 20
  Finalizar:
    Tempo: 20
  Informativo: 20
  Deathmatch:
    # Deixe 0 para desativar — duelos não usa deathmatch
    Tempo: 0
    Delay: 5
    Minimo clans: 0
    Minimo jogadores: 0

#
# Configurações exclusivas do modo Duelos (chaveamento 1v1 de clans)
Duelos:
  # Ativa o modo bracket. Se false, o tipo se comporta como uma guerra normal.
  Ativar: true

  # Quantidade de jogadores por clan em cada duelo individual.
  # Se o clan tiver menos online, usa quantos estiverem disponíveis.
  JogadoresPorDuelo: 3

  # Segundos de espera entre o fim de um duelo e o início do próximo.
  TempoEntreDuelos: 30

  # Local da arena onde os duelos acontecem.
  # Formato: mundo;x;y;z;yaw;pitch
  # Defina in-game via /duelos setarena (ou edite manualmente aqui).
  Local: 'none'

  Mensagens:
    # {clans_quantia} = número de clans no torneio
    InicioTorneio: '&6[Duelos] &eTorneio de Clans iniciado com &b{clans_quantia} &eclans!'
    # {rodada} = número da rodada  {clans_quantia} = clans restantes
    InicioRodada: '&6[Duelos] &eRodada &b{rodada} &einiciada! &b{clans_quantia} &eclans restantes.'
    # {clan_a} {clan_b} {rodada}
    InicioDuelo: '&6[Duelos] &eDuelo Rodada &b{rodada}&e: &b{clan_a} &evs &b{clan_b}&e!'
    # {vencedor} {perdedor} {rodada}
    VencedorDuelo: '&6[Duelos] &b{vencedor} &evenceu o duelo contra &c{perdedor}&e! (Rodada {rodada})'
    # {clan} = clan que avança sem adversário  {rodada}
    Bye: '&6[Duelos] &b{clan} &epassa automaticamente para a próxima rodada!'
    # {clan} = campeão  {rodadas} = total de rodadas
    Campeao: '&6[Duelos] &b{clan} &eé o grande &6&lCAMPEÃO &eapós &b{rodadas} &erodadas!'

