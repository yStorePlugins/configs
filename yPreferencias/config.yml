#
# Sistemas principais.

# Delay para carregar os dados do jogador após o login.
# Necessário para uso em servidores de mineração separados.
# Recomendado: 20 ticks
login-delay: 20

# Nome do canal global (para integração com nChat / LegendChat)
chat-global-nome: 'global'

# Nome do canal local (para integração com nChat / LegendChat)
chat-local-nome: 'local'

# Comandos de teleporte interceptados (deixe o espaço antes do nick)
comandos-tp:
  - '/tpa '
  - '/etpa '
  - '/tpahere '
  - '/etpahere '

# Comandos de pagamento interceptados (deixe o espaço antes do nick)
comandos-coin:
  - '/pay '
  - '/money pay '
  - '/eco pay '
  - '/bal pay '
