#
# Lista de comandos do plugin.

# Utilize "comando|alias" para criar aliases.
# O primeiro nome antes do primeiro "|" é o comando principal.
# Os próximos valores são aliases registrados automaticamente.
# Exemplo: 'customitems|citems|ycustomitems|itenscustom'
commands:
  # Comando principal do plugin.
  # /customitems abre o menu para jogadores com ycustomitems.use.
  # Subcomandos administrativos requerem ycustomitems.admin.
  ycustomitems: 'customitems|citems|ycustomitems|itenscustom'
