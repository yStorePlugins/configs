#
# Sistema de menus.

# Setas dos menus.
# Estas setas são lidas por Config.java e reaproveitadas em todos os menus.
arrows:
  # Botão de voltar usado em menus com navegação anterior.
  back:
    material: 'ARROW:0'
    name: '&cVoltar'
    lore: [' &7Clique para voltar.']

  # Botão da página anterior em menus paginados.
  # O placeholder <page> é substituído automaticamente pela página de destino.
  previous:
    material: 'ARROW:0'
    name: '&cAnterior &7(<page>)'
    lore: [' &7Clique para ir à página anterior.']

  # Botão da próxima página em menus paginados.
  # O placeholder <page> é substituído automaticamente pela página de destino.
  next:
    material: 'ARROW:0'
    name: '&aPróximo &7(<page>)'
    lore: [' &7Clique para ir à próxima página.']

# Menu paginado que lista todos os itens carregados da pasta items/.
# Placeholders disponíveis no item:
# {key} = chave do arquivo YAML sem .yml
# {name} = nome colorido do item
# {type} = tipo da habilidade
# {cooldown} = cooldown em segundos
# {permission} = permissão necessária para usar o item
item-list:
  # Título do inventário.
  name: '&8Itens Especiais'
  # Tamanho do inventário. Deve ser múltiplo de 9.
  size: 54
  # Slots onde os itens carregados serão exibidos pelo Scroller.
  slots: [ 10,11,12,13,14,15,16,19,20,21,22,23,24,25,28,29,30,31,32,33,34 ]
  # Slot do botão de página anterior.
  previous-slot: 45
  # Slot do botão de próxima página.
  next-slot: 53
  # Slot do botão de voltar. Use -1 para desativar.
  back-slot: -1
  # Item visual usado como fallback para representar cada item especial na lista.
  # Se o arquivo items/<chave>.yml tiver a seção icon:, o menu usa o icon: do item.
  # Se não tiver icon:, usa este template abaixo.
  item:
    material: 'BOOK'
    name: '&6&l{name}'
    lore:
      - ''
      - ' &7Chave: &f{key}'
      - ' &7Tipo: &f{type}'
      - ' &7Cooldown: &f{cooldown}s'
      - ' &7Permissão: &f{permission}'
      - ''
      - ' &eClique para ver detalhes.'
      - ''

# Menu fixo de detalhes de um item especial.
# Usado para visualizar informações e pegar uma cópia do item.
item-detail:
  # Título do inventário. Aceita {name} e {key}.
  name: '&8Item - {name}'
  # Tamanho do inventário. Deve ser múltiplo de 9.
  size: 27
  # Slot onde o item especial real será exibido.
  item-slot: 13
  # Slot do botão para receber uma cópia do item.
  give-slot: 11
  # Slot do botão para voltar ao menu de lista.
  back-slot: 15
  # Item informativo. Atualmente o item real do custom item ocupa item-slot.
  info-item:
    material: 'BOOK'
    name: '&6&l{name}'
    lore:
      - ''
      - ' &7Chave: &f{key}'
      - ' &7Tipo: &f{type}'
      - ' &7Cooldown: &f{cooldown}s'
      - ''
  # Botão para pegar uma unidade do item. Requer ycustomitems.admin.
  give-item:
    material: 'CHEST'
    name: '&aPegar item'
    lore:
      - ''
      - ' &7Clique para receber 1x &f{name}&7.'
      - ' &7Requer: &fycustomitems.admin'
      - ''
