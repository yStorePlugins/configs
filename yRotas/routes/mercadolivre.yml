# Rota de exemplo — renomeie este arquivo para definir a chave da rota.
# A chave da rota é o nome do arquivo sem o .yml (ex: exemplo.yml → chave "exemplo").

display-name: '&eEntregas MercadoLivre'
description: '&7Colete e entregue encomendas da MercadoLivre.'

# Ícone no menu de rotas
icon:
  material: 'c0e67b7a8f63b3384d2d7e3d9795ac29073e61e7798983ccd2f1384e22af6b3a'
  name: '&eEntregas MercadoLivre'
  lore:
    - '&7Seja um entregador parceiro'
    - '&7da plataforma mais rápida da cidade!'
    - ''
    - '&fObjetivo:'
    - '&7Retire os pedidos nas lojas'
    - '&7dos jogadores e entregue'
    - '&7ao centro de distribuição da empresa.'
    - ''
    - '&aRecompensas:'
    - '&7Pagamento por entrega'
    - '&7+ bônus por agilidade.'
    - ''
    - '&eDica: Use &e/rotas &epara ver suas rotas.'
    - '&eDica: Use &e/rotas cancel &epara cancelar.'
    - '&eDica: Cuidado com atrasos!'
    - ''
    - '&a▶ Clique para iniciar a rota!'

# Configurações do NPC de entrega da rota
npc:
  location: 'none'
  skin: 'yellow3'
  hologram-offset: 2.5
  hologram-lines:
  - '&eEntregas MercadoLivre'
  - '&7Clique para entregar!'

# Permissão necessária para iniciar esta rota. Deixe vazio para liberar a todos.
permission: ''

# Nome do ponto indicador
# Placeholders: {point}, {collected}, {total}.
indicator-label: '&eEncomenda MercadoLivre &c({collected}/{total})'

# Material do ponto indicador
indicator-material: 'c0e67b7a8f63b3384d2d7e3d9795ac29073e61e7798983ccd2f1384e22af6b3a'

# Tempo de cooldown entre entregas completas da rota, em segundos.
cooldown-seconds: 300

# Pontos de coleta da rota
points: {}

# Recompensas da rota, entregues ao completar a entrega no NPC. Suporta os tipos:
# - MONEY: Recompensa em dinheiro (integração com plugin de economia).
# - COMMAND: Recompensa de comando (executa um comando no console, com {player} como placeholder para o nome do jogador).
# - ITEM: Recompensa de item (entrega um item personalizado para o jogador).

rewards:
  reward1:
    type: MONEY
    provider: money
    amount: 500.0
  reward2:
    type: COMMAND
    command: 'broadcast {player} completou a rota do MercadoLivre!'
  reward3:
    type: ITEM
    item:
      material: DIAMOND
      amount: 2
      name: '&bDiamante da Entrega'
      lore:
        - '&7Recompensa da rota &eEntregas MercadoLivre&7.'
