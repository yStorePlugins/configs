#
# Sistemas principais.

# Delay para carregar os dados depois do login
# Necessário para usar em servidor de mina separado
# Recomendado: 20 ticks
login-delay: 20

# Sistemas gerais
general:
  # Raio padrão em blocos para detecção de ponto de coleta
  default-collect-radius: 2.0
  # Raio padrão em blocos para interagir com o NPC de entrega
  default-npc-radius: 3.0
  # Cooldown padrão de rota em segundos (0 = sem cooldown)
  default-cooldown-seconds: 300
  progress-bar:
    filled: '&a|'
    empty: '&7|'
    length: 20
  # Sons reproduzidos ao longo da rota (nomes do enum Sound do Bukkit)
  sounds:
    route-started: 'ENTITY_EXPERIENCE_ORB_PICKUP'
    point-collected: 'ENTITY_ITEM_PICKUP'
    all-collected: 'ENTITY_PLAYER_LEVELUP'
    delivery-success: 'ENTITY_FIREWORK_ROCKET_LAUNCH'