# Mensagens do plugin.
# Placeholders comuns: {player}, {officer}, {target}, {fine}, {reward}, {time}, {amount}, {contraband}, {max_officers}, {active_officers}

actionbar:
  inspection-progress-officer: '&6Revistando &f{target} &8| &7{bar} &8| &e{remaining}s'
  inspection-progress-target: '&cVocê está sendo revistado por &f{officer} &8| &7{bar} &8| &e{remaining}s'

chat:
  syntax: '&cUse: /{command} {syntax}'
  target: '&cJogador {player} não encontrado.'
  number: '&cO valor informado não é um número válido.'
  permission: '&cVocê não tem permissão para isso.'
  console: '&cApenas jogadores podem usar este comando.'
  cancelled: '&cVocê cancelou a ação.'
  reload: '&aConfigurações recarregadas com sucesso.'
  help: |
    &8&m-----------------------------
    &6&lContrabando &8- &7Comandos
    &8&m-----------------------------
    &e/{cmd} &8- &7Abre o menu policial.
    &e/{cmd} inspect <jogador> &8- &7Revista um jogador.
    &e/{cmd} leave &8- &7Sai da polícia.
    &8&m-----------------------------
  admin-help: |
    &8&m-----------------------------
    &6&lContrabando &8- &7Admin
    &8&m-----------------------------
    &e/{cmd} reload &8- &7Recarrega o plugin.
    &e/{cmd} add <jogador> <tempo> &8- &7Adiciona policial.
    &e/{cmd} remove <jogador> &8- &7Remove policial.
    &e/{cmd} give <jogador> <contrabando> <quantia> &8- &7Entrega contrabando.
    &e/{cmd} baton give <jogador> &8- &7Entrega Bastão da Revista.
    &8&m-----------------------------
