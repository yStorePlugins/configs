#
# Sistemas principais.

# Sistemas gerais
general:
  # Distância máxima padrão para spawnar o rotating-head para um jogador (em blocos).
  # Pode ser sobrescrito individualmente por NPC.
  default-view-distance: 48
  # Velocidade de rotação padrão do rotating-head (graus por tick).
  default-rotate-speed: 5.0
  # Velocidade de subida/descida padrão do rotating-head (step por tick).
  default-bob-speed: 0.03
  # Amplitude máxima do efeito de subida/descida (+/- blocos).
  default-bob-height: 0.4
  # Cooldown global de clique por NPC (em segundos). 0 = desativado.
  # Pode ser sobrescrito individualmente por NPC (click-cooldown no arquivo do NPC).
  click-cooldown: 0