#
# Sistemas principais.

# Sistemas gerais.
general:
  pack-drops:
    # Minutos online necessarios para premio automatico.
    online-minutes: 30
    # Quantidade de pacotes por premio.
    amount: 1
    # Tipo do pacote entregue automaticamente (deve existir em packs.yml).
    type: 'common'
  trade:
    # Cooldown para enviar novo pedido de troca.
    request-cooldown-seconds: 20

