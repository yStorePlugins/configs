# Raridades do sistema de figurinhas.
# As chaves abaixo devem ser usadas em stickers.yml e packs.yml.
rarities:
  COMMON:
    # Nome exibido para o jogador.
    name: '&7Comum'
  RARE:
    name: '&9Rara'
  EPIC:
    name: '&5Épica'
  LEGENDARY:
    name: '&6Lendária'
  GOLDEN:
    name: '&eDourada'

# Recompensas por progresso percentual do album.
# Cada chave e uma porcentagem (0-100).
# Os comandos sao executados no console com {player}.
progress-rewards:
  '10':
    - 'say {player} alcancou 10% nas Figurinhas!'
  '50':
    - 'say {player} alcancou 50% nas Figurinhas!'
  '100':
    - 'say {player} completou as Figurinhas!'

# Recompensas por ordem de conclusao do album completo (100%).
# A chave representa a posicao de chegada.
# Placeholders: {player}, {position}
album-completion-rewards:
  '1':
    - 'say {player} foi o 1o a completar o album!'
  '2':
    - 'say {player} foi o 2o a completar o album!'
  '3':
    - 'say {player} foi o 3o a completar o album!'
