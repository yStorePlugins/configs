  player-self: '&cVocê não pode usar isso em si mesmo.'
  number: '&cO valor informado não é um número válido.'
  help: |

    &8&m---------------------------------
    &6&lFigurinhas &8- &7Comandos
    &8&m---------------------------------
    &e/{command} open &8- &7Abre um pacote comum.
    &e/{command} album &8- &7Mostra o progresso do álbum.
    &e/{command} duplicates &8- &7Mostra suas figurinhas repetidas.
    &e/{command} recycle &8- &7Recicla repetidas em Pontos da Copa.
    &e/{command} trade <player> &8- &7Envia um pedido de troca.
    &e/{command} trade accept <player> &8- &7Aceita um pedido e abre o menu.
    &e/{command} shop &8- &7Abre a Loja da Copa.
    &e/{command} top &8- &7Mostra o ranking.
    &e/{command} admin ... &8- &7Comandos administrativos.
    &8&m---------------------------------
