# Mensagens a serem enviadas pelo plugin.

chat:
  syntax: '&cUse: /{command} {syntax}'
  permission: '&cVocê não tem permissão para esta ação.'
  console: '&cApenas jogadores in-game podem usar esta ação.'
  reload: '&aArquivos de configuração recarregados com sucesso.'
