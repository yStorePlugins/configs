# Site: ystoreplugins.com.br

# Modo de depuração para correção de problemas no plugin.
debug-mode: false

database:
  # Determina o tipo de banco de dados. Valores válidos: [SQLITE, MYSQL, HIKARI (recomendado)]
  storage-type: SQLITE

  # Dados para conexão ao banco de dados MYSQL.
  data:
    # Endereço de conexão do banco de dados. [EX: 127.0.0.1]
    host: localhost
    # Porta de conexão do banco de dados. [EX: 3306]
    port: 3306
    # Nome do banco de dados a ser conectado. [EX: minecraft]
    database: ''
    # Usuário de conexão. [EX: root]
    username: ''
    # Senha do usuário de conexão: [EX: 123]
    password: ''

# Delay para carregar os dados depois do login
# Necessário para usar em servidor de mina separado
# Recomendado: 20 ticks
login-delay: 20

# Este limite serve para recolher recompensas
# Desativar ou aumentar o limite pode gerar lag
limit:
  enabled: true
  max: 1000

# Task de atualização do planeta (partículas e status) em ticks
update-period: 3

# Enviar a mensagem de dominância global a cada x segundos
message-time: 60

# Começar a capturar apenas depois de uma batalha entre 2+ clans
first-battle: false

# Ativar as partículas na zona de captura
particles: true

# BossBar durante o evento de captura
bossbar:
  enabled: true
