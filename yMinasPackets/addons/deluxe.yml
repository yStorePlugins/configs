# Configuração da boss-bar
boss-bar:
  # Ativar a boss-bar
  enabled: true
  # Delay de atualização
  # em segundos
  delay: 3
  # Porcentagem de preenchimento da barra de progresso
  # deixe -1 para usar a % de evolução do nível da picareta
  progress: -1
  # Mensagem da boss-bar
  bar: 'Energia: {energy}/{next_energy} - {percentage}'

# Encantamento do magnetismo
magnet:
  # Duração da animação
  block-amount: 100
  # Duração da animação
  # em segundos
  duration: 20

# Encantamento da abelha explosiva
bee-explosive:
  # Quantidade de abelhas spawned
  amount: 1
  # Duração da animação
  # em segundos
  duration: 6
  # Mob que será spawnado (nome do EntityType do Bukkit)
  # Padrão: BEE
  mob: 'BEE'
  # Aplicar efeito de brilho (glowing) no mob
  glowing: true

# Encantamento da magma
magma-enchant:
  # Material do bloco visual (nome do Material do Bukkit)
  block: 'MAGMA_BLOCK'
  # Quantidade de blocos afetados
  amount: 30
  # Delay antes de quebrar os blocos
  # em segundos
  delay: 3
  # Ticks entre cada onda de espalhamento visual
  # (1 tick = 0.05s — 1-2 blocos por tick, estilo lava)
  spread-ticks: 1

# Encantamento do vampiro
vampire:
  # Mensagens que irão aparecer depois de 3s de ativo
  messages:
    title: 'Aproveite o luar...'
    actionbar: ''
    chat: ''
  # Bônus por nível de vampiro
  bonus-per-level: 1.0
  # Partícula que ficará em volta do jogador
  particle: 'soul'
  # Tempo total do efeito
  # em segundos
  time: 10
  # Efeito de mudança do clima
  weather:
    # deixe 13000 para a 1.13+
    night-time: 18000
    # -1 para pegar o clima anterior ao ativar o encantamento
    day-time: -1

