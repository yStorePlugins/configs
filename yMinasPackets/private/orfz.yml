# Chave de verificação
key: ''

# Encantamento da abelha explosiva
bee-explosive:
  # Quantidade de abelhas spawned
  amount: 1
  # Duração da animação
  # em segundos
  duration: 6
  # Mob que será spawnado (nome do EntityType do Bukkit)
  # Padrão: BEE
  mob: 'BEE'
  # Aplicar efeito de brilho (glowing) no mob
  glowing: true

# Explosões customizadas
# Cada entrada abaixo cria um encantamento de explosão independente.
# O nome da chave (ex: explosion1) vira o ID do encantamento.
# Remova ou adicione entradas conforme necessário.
custom-explosions:
  explosion1:
    radius: 3
  explosion2:
    radius: 5

# Encantamento da magma
magma-enchant:
  # Material do bloco visual (nome do Material do Bukkit)
  block: 'MAGMA_BLOCK'
  # Quantidade de blocos afetados
  amount: 30
  # Delay antes de quebrar os blocos
  # em segundos
  delay: 3
  # Ticks entre cada onda de espalhamento visual
  # (1 tick = 0.05s — 1-2 blocos por tick, estilo lava)
  spread-ticks: 1

enchants:
